services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - RETRACE_MODE=api
      - RETRACE_API_HOST=0.0.0.0
      - RETRACE_API_PORT=8788
    ports:
      - "8788:8788"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env:ro
      - ./data:/app/data
      - ./reports:/app/reports
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - RETRACE_MODE=worker
      - RETRACE_WORKER_INTERVAL_SECONDS=10
      - RETRACE_WORKER_LIMIT=25
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env:ro
      - ./data:/app/data
      - ./reports:/app/reports
    restart: unless-stopped

  cron:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - RETRACE_MODE=cron
      - RETRACE_CRON=0 */6 * * *
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env:ro
      - ./data:/app/data
      - ./reports:/app/reports
    restart: unless-stopped
