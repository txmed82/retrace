<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="293" viewBox="0 0 1366 293" role="img" aria-label="Retrace banner">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b7ffb0"/>
      <stop offset="100%" stop-color="#8dfc86"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1366" height="293" fill="#02060a"/>

  <text x="44" y="168"
        font-family="Menlo, Consolas, 'Courier New', monospace"
        font-size="158"
        letter-spacing="3"
        fill="none"
        stroke="url(#glow)"
        stroke-width="2.2"
        stroke-dasharray="16 8"
        filter="url(#softGlow)">retrace</text>

  <line x1="40" y1="236" x2="1094" y2="236" stroke="#7e8894" stroke-width="2" opacity="0.8"/>

  <text x="54" y="279"
        font-family="Menlo, Consolas, 'Courier New', monospace"
        font-size="40"
        fill="#9fe596"
        letter-spacing="0.8"
        filter="url(#softGlow)">Reconstruct. Understand. Debug.</text>
</svg>
