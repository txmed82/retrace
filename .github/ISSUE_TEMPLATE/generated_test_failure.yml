name: Generated UI test failure
description: Report a problem with replay-derived regression specs or runner behavior.
title: "[Generated test]: "
labels: ["testing"]
body:
  - type: markdown
    attributes:
      value: |
        Use this when a replay-derived spec is flaky, invalid, missing important actions, or fails to reproduce the original issue.
  - type: textarea
    id: source_issue
    attributes:
      label: Source replay issue
      description: Include replay issue ID, session ID, project/environment ID, and generated spec ID if available.
      render: text
    validations:
      required: true
  - type: dropdown
    id: runner
    attributes:
      label: Runner
      options:
        - Native HTTP runner
        - Browser Harness / Playwright
        - CI runner
        - Unsure
    validations:
      required: true
  - type: textarea
    id: failure
    attributes:
      label: Failure details
      description: Paste the generated spec summary, runner output, and whether the original UI failure was reproduced.
      render: text
    validations:
      required: true
  - type: textarea
    id: selectors
    attributes:
      label: Selector or action problems
      description: Note missing `data-testid`, unstable text selectors, coordinate fallback, or incorrect input/click actions.
  - type: textarea
    id: expected
    attributes:
      label: Expected generated test
      description: What should the generated spec assert or interact with?
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed API keys, service tokens, user PII, and sensitive replay data.
          required: true
