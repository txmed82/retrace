name: Detector quality issue
description: Report a detector false positive or false negative.
title: "[Detector]: "
labels: ["detector", "quality"]
body:
  - type: dropdown
    id: detector
    attributes:
      label: Detector
      options:
        - console_error
        - network_4xx
        - network_5xx
        - rage_click
        - dead_click
        - error_toast
        - blank_render
        - session_abandon_on_error
        - unsure
    validations:
      required: true
  - type: dropdown
    id: failure_type
    attributes:
      label: Failure Type
      options:
        - False positive
        - False negative
        - Bad severity
        - Bad clustering
        - Missing evidence
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should Retrace have detected or ignored?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized Evidence
      description: Include event snippets, signal JSON, URLs, or replay context with secrets removed.
      render: json
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Check
      options:
        - label: I removed API keys, service tokens, user PII, and sensitive replay data.
          required: true
