name: Feature request
description: Propose a product or integration improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow gap does this solve?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Capture / SDK
        - Detection
        - Replay issue UX
        - Test generation
        - Code matching
        - Agent prompts
        - BYOK / providers
        - GitHub / Linear / code hosts
        - Self-hosting / operations
        - Contributor experience
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, UI, or docs you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include workarounds or adjacent tools if relevant.
