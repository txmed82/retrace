name: Feature request
description: Suggest a workflow, integration, detector, runner, or SDK improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or failure mode should Retrace handle better?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Browser SDK
        - Replay ingest
        - Detectors
        - Replay-derived tests
        - Coding-agent prompts
        - GitHub/code matching
        - Local UI
        - Self-host operations
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches or tools you considered.
