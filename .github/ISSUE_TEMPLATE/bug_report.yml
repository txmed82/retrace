name: Bug report
description: Report a CLI, API, UI, storage, or workflow defect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Local UI
        - Replay API
        - Worker or cron
        - Storage
        - Docker/self-host
        - GitHub or Linear sink
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Include commands, config shape, and any sample replay IDs.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, trace IDs, screenshots, or JSON output with secrets removed.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version or Commit
      placeholder: commit SHA, tag, or Docker image
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Check
      options:
        - label: I removed API keys, service tokens, user PII, and sensitive replay data.
          required: true
