name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Tests
        run: pytest -q

  postgres-smoke:
    name: Postgres smoke
    runs-on: ubuntu-latest
    needs: ci
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: retrace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies (with postgres extra)
        run: uv pip install --system -e ".[dev,postgres]"

      - name: Run Postgres smoke tests
        env:
          RETRACE_POSTGRES_TEST_URL: postgresql://postgres:postgres@localhost:5432/retrace_test
        run: pytest tests/test_postgres_smoke.py -q

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: retrace:ci-${{ github.sha }}

  browser-sdk:
    name: Build Browser SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/browser/package-lock.json

      - name: Install browser SDK dependencies
        working-directory: packages/browser
        run: npm ci

      - name: Build browser SDK
        working-directory: packages/browser
        run: npm run build

      - name: Run browser SDK tests
        working-directory: packages/browser
        run: npm test

  python-sdk-tests:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install retrace-sdk with test extras
        working-directory: packages/python-sdk
        run: uv pip install --system -e ".[test]"

      - name: Run SDK tests (no e2e, no main retrace dep)
        working-directory: packages/python-sdk
        run: pytest tests -q -m 'not e2e' --ignore=tests/test_e2e_ingest.py

      # Run the e2e test on one matrix entry where the main package is
      # also installed — it validates the SDK's envelope against the
      # real ingest pipeline.
      - name: Install main retrace package for e2e
        if: matrix.python-version == '3.11'
        run: uv pip install --system -e ".[dev]"

      - name: Run SDK e2e test
        if: matrix.python-version == '3.11'
        run: pytest packages/python-sdk/tests/test_e2e_ingest.py -q

  playwright-runner:
    name: Playwright Runner Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install browser test dependencies
        run: uv pip install --system -e ".[dev,browser]"

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Playwright runner tests
        run: pytest tests/test_tester_playwright.py -q

  cd-ghcr:
    name: Publish Docker Image (GHCR)
    runs-on: ubuntu-latest
    needs: [ci, docker-build, browser-sdk, playwright-runner, python-sdk-tests, postgres-smoke]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
